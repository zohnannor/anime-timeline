name: Deploy PR Preview

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - closed

permissions:
    contents: write
    pages: write
    id-token: write

concurrency: preview-${{ github.ref }}

jobs:
    deploy-preview:
        runs-on: ubuntu-latest
        if: github.event.action != 'closed'
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Required for restore-mtime to find commit dates
                  lfs: true

            - name: Restore file modification times
              uses: chetan/git-restore-mtime-action@v2

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'yarn'

            - name: Install Dependencies
              run: yarn install --immutable

            - name: Lint Project
              run: yarn lint
              continue-on-error: true

            - name: Check formatting
              run: yarn prettylint src # TODO: replace with biome?
              continue-on-error: true

            - name: Cache WebP Images
              uses: actions/cache@v4
              with:
                  path: public/*
                  key: webp-${{ hashFiles('bin/optimize-images.py', 'assets/**') }}-${{ github.ref }}
                  restore-keys: |
                      webp-${{ hashFiles('bin/optimize-images.py', 'assets/**') }}-
                      webp-

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y webp

            - name: Install ImageMagick
              uses: mfinelli/setup-imagemagick@v6

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.x'

            - name: Run image optimization
              run: |
                  if [[ "${{ github.event.inputs.force_optimize }}" == "true" ]] || [[ "${{ contains(github.event.head_commit.message, '[force-optimize]') }}" == "true" ]]; then
                    FORCE_FLAG="--force"
                  else
                    FORCE_FLAG=""
                  fi
                  echo "Running image optimization..."
                  python -m bin.optimize-images --all $FORCE_FLAG --cpu $CPU --color=always # use pretty colors :)
              env:
                  CPU: 2

            - name: Build Project
              run: yarn build

            - name: Deploy preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: ./build
                  preview-branch: gh-pages
                  umbrella-dir: pr-preview
                  action: auto
                  qr-code: true
