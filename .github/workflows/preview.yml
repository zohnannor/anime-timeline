name: Deploy PR Preview

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - closed

permissions:
    contents: write
    pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
    build:
        if: github.event.action != 'closed'
        uses: ./.github/workflows/build.yml
        with:
            base_path: /anime-timeline/pr-preview/pr-${{ github.event.pull_request.number }}/
            force_condition: ${{ contains(github.event.pull_request.title, '[force-optimize]') }}
            skip_errors: true

    deploy:
        needs: build
        if: ${{ always() && (github.event.action == 'closed' || needs.build.result == 'success') }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download build artifact
              if: github.event.action != 'closed'
              uses: actions/download-artifact@v4
              with:
                  name: build-output
                  path: ./build

            - name: Ensure build directory exists
              if: github.event.action == 'closed'
              run: mkdir -p ./build

            - name: Deploy preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: ./build
                  preview-branch: gh-pages
                  umbrella-dir: pr-preview
                  action: auto
                  qr-code: true
