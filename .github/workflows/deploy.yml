name: Deploy Static Content to GitHub Pages

on:
    push:
        branches: ['main']

permissions:
    contents: write

concurrency:
    group: 'pages'
    cancel-in-progress: true

jobs:
    build:
        uses: ./.github/workflows/build.yml
        with:
            base_path: /anime-timeline/
            force_condition: ${{ github.event.head_commit && contains(github.event.head_commit.message, '[force-optimize]') }}

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-output
                  path: ./build

            - name: Deploy to GitHub Pages
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  folder: ./build
                  branch: gh-pages
                  clean-exclude: pr-preview/
                  force: false
